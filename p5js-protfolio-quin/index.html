<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js Creative Coding Archive</title>
  <style>
    /* 1. 기본 스타일 리셋 및 세련된 배경 지정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: min-content;
      min-height: 100vh;
      padding: 40px 20px;
      /* 미디어 아트를 돋보이게 하는 고급스러운 다크 그라데이션 배경 */
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f8fafc;
    }

    /* 2. 타이틀 & 과제 소개 영역 */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1rem;
      color: #94a3b8;
      font-weight: 300;
    }

    /* 3. 2행 2열 요구사항 그리드 레이아웃 */
    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 800px; /* 프레임이 더 시원하게 보이도록 확장 */
      gap: 24px;       /* 여백을 넓혀 답답함 해소 */
      margin-bottom: 40px;
    }

    /* 4. 개별 과제 카드 (글래스모피즘 및 호버 애니메이션) */
    #projects .cell {
      aspect-ratio: 16 / 10;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 마우스 호버 시 카드 인포 커튼 효과 및 테두리 발광 */
    #projects .cell:hover {
      transform: translateY(-8px);
      border-color: rgba(129, 140, 248, 0.6);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.25);
    }

    /* 카드 상단에 과제 번호 라벨링 추가 */
    #projects .cell::before {
      content: attr(data-title);
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(15, 23, 42, 0.75);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #38bdf8;
      border: 1px solid rgba(56, 189, 248, 0.3);
      z-index: 10;
      pointer-events: none;
    }

    /* 5. iframe 정밀 제어 및 스케일 최적화 */
    #projects .cell iframe {
      position: absolute;
      top: 0;
      left: 0;
      /* 부모 너비가 800px의 절반(약 388px)이므로 내부 캔버스를 안정적으로 담기 위해 2배수로 크기 업 */
      width: 776px;
      height: 485px;
      border: none;
      transform-origin: top left;
      /* 2倍로 키운 iframe을 부모 박스 크기에 맞게 0.5배로 축소 연산 처리 */
      transform: scale(0.5); 
      background: transparent;
    }

    /* 하단 정보 등록 구역 */
    footer {
      font-size: 0.8rem;
      color: #64748b;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <h1>p5.js Creative Archive</h1>
    <p>미디어커뮤니케이션전공 인터랙티브 그래픽스 포트폴리오</p>
  </header>

  <main id="projects">

    <div class="cell" data-title="PROJECT 01">
      <iframe src="sample1/index.html" scrolling="no"></iframe>
    </div>

    <div class="cell" data-title="PROJECT 04">
      <iframe src="sample4/index.html" scrolling="no"></iframe>
    </div>

    <div class="cell" data-title="PROJECT 02">
      <iframe src="sample2/index.html" scrolling="no"></iframe>
    </div>

    <div class="cell" data-title="PROJECT 03">
      <iframe src="sample3/index.html" scrolling="no"></iframe>
    </div>

  </main>

  <footer>
    <p>&copy; 2026 Interactive Media Art Portfolio. All Rights Reserved.</p>
  </footer>

</body>
</html>
